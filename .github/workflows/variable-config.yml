name: variable

env:
  greeting: Hello
on:
  workflow_dispatch:
  push: 
    branches: [ "main"]
    
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      emp-name: Gandhi
    steps:
      - uses: actions/checkout@v4

      - name: maven check
        run : mvn -version
      - name: project welcome
        run: echo "${{env.greeting}} ${{env.emp-name}} you are assigning to ${{vars.PROJECT_NAME}} project"

      
